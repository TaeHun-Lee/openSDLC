artifact_id: "{{validated_artifact_id}}-VAL-{{validation_attempt}}"
artifact_type: "ValidationReportArtifact"
iteration: {{iteration}}
created_by: "ValidatorAgent"
created_at: "{{timestamp}}"
source_artifact_ids:
  - "{{validated_artifact_id}}"
status: "{{validation_status}}"
summary: "{{this_artifact_summary}}"
instructions_for_next_agent: |
  아래 validation_result와 next_action을 기준으로
  다음 단계 진행 또는 재작업을 수행하라.

validated_artifact_id: "{{validated_artifact_id}}"
validated_artifact_type: "{{validated_artifact_type}}"
validated_stage: "{{validated_stage}}"
validation_attempt: {{validation_attempt}}
validation_result: "pass"

checks:
  - check_name: "schema"
    result: "pass"
    evidence: "{{schema_evidence}}"
  - check_name: "traceability"
    result: "pass"
    evidence: "{{traceability_evidence}}"
  - check_name: "role_boundary"
    result: "pass"
    evidence: "{{role_boundary_evidence}}"

stage_check_guidance:
  common_required_checks:
    - "schema"
    - "traceability"
    - "evidence"
    - "decision_consistency"
    - "role_boundary"
    - "no_regression"
  UC:
    required_checks:
      - "scope_clarity"
      - "acceptance_criteria_testability"
      - "instruction_completeness"
      - "e2e_decomposition_quality"
      - "failure_mode_separation"
  IMPL:
    required_checks:
      - "scope_adherence"
      - "implementation_consistency"
  TEST-DESIGN:
    required_checks:
      - "acceptance_criteria_coverage"
      - "main_flow_coverage"
      - "precondition_coverage"
      - "trigger_coverage"
      - "observable_outcome_coverage"
      - "scenario_quality"
      - "evidence_type_definition"
  TEST-EXECUTION:
    required_checks:
      - "test_design_traceability"
      - "scenario_execution_completeness"
      - "evidence_quality"
      - "evidence_type_consistency"
      - "defect_quality"
      - "score_consistency"
  FB:
    required_checks:
      - "defect_task_mapping"
      - "done_criteria_testability"
      - "decision_consistency"
      - "reqagent_handoff_boundary"

violations:
  - rule: "{{optional_failed_rule}}"
    severity: "{{low_or_medium_or_high}}"
    description: "{{optional_violation_description}}"
    recommended_action: "{{optional_recommended_action}}"

warnings:
  - "{{optional_warning_1}}"
  - "{{optional_warning_2}}"

next_action:
  action: "proceed"
  target_agent: "{{next_agent_or_original_agent}}"
  reason: "{{next_action_reason}}"

blocking_reason: "{{optional_blocking_reason}}"
rework_target_artifact_id: "{{optional_rework_target_artifact_id}}"

action_rules:
  allowed_actions:
    - "proceed"
    - "rework"
    - "hold"
  mapping:
    pass: "proceed"
    warning: "pma_decides_proceed_or_hold"
    fail: "rework"
  warning_allowed_actions:
    - "proceed"
    - "hold"

status_rules:
  mapping:
    pass: "approved"
    warning: "actionable"
    fail: "feedback-required"
  interpretation:
    approved: "Validation passed and the artifact is approved for downstream progression."
    actionable: "Validation found non-blocking risk that remains visible while PMAgent decides whether to proceed or hold."
    feedback-required: "Validation failed and the producing agent must rework the source artifact before safe progression."
