artifact_id: "IMPL-{{id}}"
artifact_type: "ImplementationArtifact"
iteration: {{iteration}}
created_by: "CodeAgent"
created_at: "{{timestamp}}"
source_artifact_ids:
  - "UC-{{source_usecase_id}}"
  - "TD-{{source_test_design_id}}"
status: "implemented"
summary: "{{this_artifact_summary}}"
instructions_for_next_agent: |
  UseCaseModelArtifact, TestDesignArtifact와 ImplementationArtifact를 기준으로
  구현 결과를 검증하라.
  검증 결과는 ValidationReportArtifact로 작성하라.

implementation_target:
  use_case_ids:
    - "UC-{{source_usecase_id}}-01"
  test_design_id: "TD-{{source_test_design_id}}"

implemented_features:
  - "{{implemented_feature_1}}"
  - "{{implemented_feature_2}}"
  - "{{implemented_feature_3}}"

files_changed:
  - "{{file_path_1}}"
  - "{{file_path_2}}"
  - "{{file_path_3}}"

runtime_info:
  entrypoint: "{{run_command}}"
  test_url: "{{test_url}}"

known_limitations:
  - "{{known_limitation_1}}"
  - "{{known_limitation_2}}"

traceability:
  - use_case_id: "UC-{{source_usecase_id}}-01"
    test_scenario_ids:
      - "TS-{{source_test_design_id}}-01"
    implemented_by:
      - "{{implementation_mapping_1}}"
      - "{{implementation_mapping_2}}"

implementation_notes:
  - "{{note_1}}"
  - "{{note_2}}"
