artifact_id: "TD-{{id}}"
artifact_type: "TestDesignArtifact"
iteration: {{iteration}}
created_by: "TestAgent"
created_at: "{{timestamp}}"
source_artifact_ids:
  - "UC-{{source_usecase_id}}"
status: "draft"
summary: "{{this_artifact_summary}}"
instructions_for_next_agent: |
  TestDesignArtifact를 검증하라.
  coverage completeness, scenario quality, evidence type 정의를 확인하라.
  검증 결과는 ValidationReportArtifact로 작성하라.

test_design_scope:
  use_case_ids:
    - "UC-{{source_usecase_id}}-01"

coverage_plan:
  acceptance_criteria:
    - item: "{{acceptance_criteria_1}}"
      covered_by_scenarios:
        - "TS-{{id}}-01"
  main_flow_steps:
    - item: "{{main_flow_step_1}}"
      covered_by_scenarios:
        - "TS-{{id}}-01"
  preconditions:
    - item: "{{precondition_1}}"
      covered_by_scenarios:
        - "TS-{{id}}-01"
  triggers:
    - item: "{{trigger_1}}"
      covered_by_scenarios:
        - "TS-{{id}}-01"
  observable_outcomes:
    - item: "{{observable_outcome_1}}"
      covered_by_scenarios:
        - "TS-{{id}}-01"

test_scenarios:
  - scenario_id: "TS-{{id}}-01"
    related_use_case_id: "UC-{{source_usecase_id}}-01"
    purpose: "{{scenario_purpose}}"
    setup: "{{setup}}"
    action: "{{action}}"
    expected_result: "{{expected_result}}"
    evidence_type: "{{runtime_or_code_or_mixed}}"
    runtime_evidence_required: true
    code_only_verification_allowed: false
  - scenario_id: "TS-{{id}}-02"
    related_use_case_id: "UC-{{source_usecase_id}}-01"
    purpose: "{{scenario_purpose_2}}"
    setup: "{{setup_2}}"
    action: "{{action_2}}"
    expected_result: "{{expected_result_2}}"
    evidence_type: "{{runtime_or_code_or_mixed_2}}"
    runtime_evidence_required: false
    code_only_verification_allowed: true

coverage_summary:
  uncovered_items:
    - "{{optional_uncovered_item_or_na}}"
  design_notes:
    - "{{design_note_1}}"
    - "{{design_note_2}}"
