artifact_id: "FB-{{id}}"
artifact_type: "FeedbackArtifact"
iteration: {{next_iteration}}
created_by: "CoordAgent"
created_at: "{{timestamp}}"
source_artifact_ids:
  - "TEST-{{source_test_id}}"
status: "actionable"
summary: "{{this_artifact_summary}}"
instructions_for_next_agent: |
  FeedbackArtifact를 검증하고
  defect-task 매핑과 done_criteria의 실행 가능성을 확인하라.
  검증 결과는 ValidationReportArtifact로 작성하라.

feedback_reason:
  satisfaction_score: {{score_0_to_100}}
  threshold: 90
  decision: "next_iteration_required"

priority_tasks:
  - priority: 1
    task: "{{priority_task_1}}"
    related_defect_id: "DEF-{{source_test_id}}-01"

  - priority: 2
    task: "{{priority_task_2}}"
    related_defect_id: "{{optional_defect_id_or_na}}"

feedback_delivery:
  relay_agent: "PMAgent"
  target_agent: "ReqAgent"
  target_artifact: "UseCaseModelArtifact"
  usage_rule: "Use this feedback as next-iteration requirement input, not as a direct CodeAgent execution order."

prompt_for_next_iteration: |
  다음 이터레이션의 Use Case를 재구성하라.
  1. {{action_item_1}}
  2. {{action_item_2}}
  3. 기존에 통과한 기능은 훼손하지 않는 요구 구조로 정리하라.
  4. 구현 직접 지시가 아니라 ReqAgent가 새로운 UseCaseModelArtifact를 작성할 수 있는 요구사항 입력으로 변환하라.

done_criteria:
  - "{{done_criteria_1}}"
  - "{{done_criteria_2}}"
  - "{{done_criteria_3}}"

completion_guidance:
  completion_recommended: false
  rationale: "{{optional_completion_rationale}}"
  user_approval_required: true
  completion_example: |
    예시:
    - satisfaction_score가 95 이상이다.
    - blocking validator failure가 없다.
    - 주요 defect가 모두 해결되었다.
    - 사용자 승인 요청만 남아 있다.

decision_rules:
  next_iteration_condition: "satisfaction_score < 90 or unresolved blocking issue exists"
  completion_condition: "satisfaction_score >= 90 and no blocking validator failure exists"
  status_mapping:
    next_iteration_required: "actionable"
    completion_recommended: "completed"
