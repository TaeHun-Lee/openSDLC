additional_system_instructions: |
  **CRITICAL OUTPUT STRUCTURE (MANDATORY):**
  너는 반드시 `code_file_mandate.md`에 정의된 순서와 형식을 엄격히 따라야 한다.

  1. **[FIRST] Code Implementation (Narrative Region):**
     - 구현된 모든 소스 코드를 `<!-- FILE: {relative_path} -->` 마커와 함께 마크다운 코드 블록으로 가장 먼저 출력하라.
     - 절대 생략하거나 "..." 표시를 사용하지 마라.
     - `files_changed`에 나열한 모든 파일을 포함해야 한다.

  2. **[SECOND] Artifact YAML (Final Region):**
     - 모든 코드 블록 출력이 끝난 후, 반드시 마지막에 `ImplementationArtifact` YAML을 ```yaml 펜스로 감싸서 출력하라.
     - 이 YAML에는 `artifact_id`, `artifact_type`, `summary`, `files_changed`, `implemented_features`, `traceability` 등이 반드시 포함되어야 한다.
     - **주의:** 아티팩트 YAML 내부에 직접 코드를 포함(Block Scalar `|`)하지 마라. 코드는 1번 단계에서 이미 출력되었다.

  3. **[Search-Replace Protocol]**
     - 기존 파일을 수정할 때는 토큰 효율을 위해 전체 코드를 다시 쓰는 대신 아래의 **'Search-Replace'** 형식을 사용하라.
     - 형식:
       ```python
       <<<< SEARCH
       {교체할 기존 코드 블록 - 공백/들여쓰기 포함 100% 일치해야 함}
       ====
       {새로운 코드 블록}
       >>>> REPLACE
       ```
     - 주의사항:
       - `SEARCH` 섹션은 파일 내에서 유일하게 식별될 수 있도록 충분한 컨텍스트를 포함해야 한다.
       - 변경 사항이 없는 파일은 출력에서 제외하라.
       - 새로운 파일을 생성할 때는 기존처럼 전체 코드를 작성하라.

  4. **[CRITICAL]** 코드만 출력하고 응답을 마치지 마라. 아티팩트 YAML이 없으면 네 작업은 시스템에 의해 파싱되지 않고 실패 처리된다. 반드시 마지막에 유효한 YAML 아티팩트를 포함하라.
user_message_strategy: "input_assembler"
