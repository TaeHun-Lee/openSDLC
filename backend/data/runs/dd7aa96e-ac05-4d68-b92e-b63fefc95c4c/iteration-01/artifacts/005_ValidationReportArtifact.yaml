checks:
  - check_name: "schema"
    result: "pass"
    evidence: "TestDesignArtifact `TD-01`은 `TestDesignArtifact.yaml` 스키마를 완벽하게 준수합니다. 모든 필수 필드가 존재하고 올바른 형식으로 작성되었습니다."
  - check_name: "traceability"
    result: "pass"
    evidence: "`source_artifact_ids`가 `UC-01`을 정확히 참조하고 있으며, `test_scenarios` 내의 `related_use_case_id` 필드도 `UC-01-01`, `UC-01-02`, `UC-01-03`과 같이 하위 Use Case를 명확히 추적합니다."
  - check_name: "role_boundary"
    result: "pass"
    evidence: "TestAgent는 테스트 설계 역할에만 집중했으며, 구현 코드 작성이나 사용자에게 직접적인 의사 결정을 요구하는 월권을 행사하지 않았습니다."
  - check_name: "acceptance_criteria_coverage"
    result: "pass"
    evidence: "`coverage_plan.acceptance_criteria`에 명시된 모든 항목이 최소 하나 이상의 테스트 시나리오(`covered_by_scenarios`)에 의해 커버되고 있습니다."
  - check_name: "main_flow_coverage"
    result: "pass"
    evidence: "`coverage_plan.main_flow_steps`에 명시된 모든 주요 흐름 단계가 테스트 시나리오에 의해 커버되고 있습니다."
  - check_name: "precondition_coverage"
    result: "pass"
    evidence: "`coverage_plan.preconditions`에 명시된 모든 전제 조건이 테스트 시나리오에 의해 커버되고 있습니다."
  - check_name: "trigger_coverage"
    result: "pass"
    evidence: "`coverage_plan.triggers`에 명시된 모든 트리거가 테스트 시나리오에 의해 커버되고 있습니다."
  - check_name: "observable_outcome_coverage"
    result: "pass"
    evidence: "`coverage_plan.observable_outcomes`에 명시된 모든 관찰 가능한 결과가 테스트 시나리오에 의해 커버되고 있습니다."
  - check_name: "scenario_quality"
    result: "pass"
    evidence: "각 테스트 시나리오(`test_scenarios`)는 `purpose`, `setup`, `action`, `expected_result`가 명확하고 구체적으로 정의되어 있습니다. 경계값 조건(1월->12월, 12월->1월)도 적절히 포함하여 시나리오의 품질이 높습니다."
  - check_name: "evidence_type_definition"
    result: "pass"
    evidence: "모든 시나리오에서 `evidence_type: \"runtime\"`, `runtime_evidence_required: true`, `code_only_verification_allowed: false`가 일관되게 정의되어 있으며, 이는 UI 중심의 달력 애플리케이션 테스트에 적합합니다."

