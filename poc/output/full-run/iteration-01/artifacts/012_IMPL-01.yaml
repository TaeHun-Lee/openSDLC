code_files:
  - path: "index.html"
    language: "html"
    content: |
      <!DOCTYPE html>
      <html lang="ko">
      <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>로또 번호 생성기</title>
          <link rel="stylesheet" href="css/style.css">
      </head>
      <body>
          <div class="container">
              <h1>로또 번호 생성기</h1>
              <button id="generate-btn">번호 생성</button>
              <div id="lotto-numbers">
                  <!-- 생성된 번호가 여기에 표시됩니다 -->
              </div>
          </div>
          <script src="js/app.js"></script>
      </body>
      </html>
  - path: "css/style.css"
    language: "css"
    content: |
      body {
          font-family: Arial, sans-serif;
          display: flex;
          justify-content: center;
          align-items: center;
          height: 100vh;
          margin: 0;
          background-color: #f0f2f5;
      }

      .container {
          text-align: center;
          background: white;
          padding: 40px;
          border-radius: 8px;
          box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      }

      h1 {
          margin-bottom: 20px;
          color: #333;
      }

      #generate-btn {
          padding: 10px 20px;
          font-size: 16px;
          cursor: pointer;
          border: none;
          background-color: #007bff;
          color: white;
          border-radius: 5px;
          margin-bottom: 20px;
          transition: background-color 0.3s;
      }

      #generate-btn:hover {
          background-color: #0056b3;
      }

      #lotto-numbers {
          display: flex;
          justify-content: center;
          align-items: center;
          gap: 10px;
          min-height: 50px;
      }

      .number-ball {
          display: flex;
          justify-content: center;
          align-items: center;
          width: 40px;
          height: 40px;
          border-radius: 50%;
          background-color: #f1c40f;
          color: #333;
          font-size: 18px;
          font-weight: bold;
      }
  - path: "js/app.js"
    language: "javascript"
    content: |
      document.addEventListener('DOMContentLoaded', () => {
          const generateBtn = document.getElementById('generate-btn');
          const numbersContainer = document.getElementById('lotto-numbers');

          generateBtn.addEventListener('click', () => {
              // 1. 기존에 표시된 번호를 지웁니다.
              numbersContainer.innerHTML = '';

              // 2. 중복되지 않는 6개의 숫자를 생성하기 위해 Set을 사용합니다.
              const lottoNumbers = new Set();
              while (lottoNumbers.size < 6) {
                  const randomNumber = Math.floor(Math.random() * 45) + 1;
                  lottoNumbers.add(randomNumber);
              }

              // 3. Set을 배열로 변환한 후 오름차순으로 정렬합니다.
              const sortedNumbers = Array.from(lottoNumbers).sort((a, b) => a - b);

              // 4. 정렬된 번호를 화면에 표시합니다.
              sortedNumbers.forEach(number => {
                  const numberBall = document.createElement('div');
                  numberBall.className = 'number-ball';
                  numberBall.textContent = number;
                  numbersContainer.appendChild(numberBall);
              });
          });
      });