summary: "CLI TODO 애플리케이션의 UseCaseModelArtifact 'UC-1'에 대한 테스트 설계서 초안입니다. 모든 Use Case의 주요 흐름, 대체 흐름, 예외 상황 및 영속성 기능을 포함한 8가지 시나리오가 정의되었습니다."
instructions_for_next_agent: |
  TestDesignArtifact를 검증하라.
  coverage completeness, scenario quality, evidence type 정의를 확인하라.
  각 시나리오가 UseCaseModelArtifact의 acceptance criteria, main_flow, alternate_flows를 적절히 커버하는지 검토하라.
  검증 결과는 ValidationReportArtifact로 작성하라.

test_design_scope:
  use_case_ids:
    - "UC-1-01"
    - "UC-1-02"
    - "UC-1-03"

coverage_plan:
  acceptance_criteria:
    - item: "`add '내용'` 형식으로 명령을 실행하면 할 일이 추가되어야 한다."
      covered_by_scenarios:
        - "TS-1-01"
    - item: "추가된 할 일은 목록 조회 시 마지막에 나타나야 한다."
      covered_by_scenarios:
        - "TS-1-01"
    - item: "할 일 내용 없이 `add` 명령만 실행하면, '추가할 내용이 없습니다.'와 같은 오류 메시지가 출력되어야 한다."
      covered_by_scenarios:
        - "TS-1-02"
    - item: "`list` 명령을 실행하면 저장된 모든 할 일이 번호와 함께 출력되어야 한다."
      covered_by_scenarios:
        - "TS-1-03"
    - item: "할 일이 없는 경우 '할 일이 없습니다.' 메시지가 출력되어야 한다."
      covered_by_scenarios:
        - "TS-1-04"
    - item: "`complete <번호>` 형식으로 명령을 실행하면 해당 번호의 할 일이 목록에서 제거되어야 한다."
      covered_by_scenarios:
        - "TS-1-05"
    - item: "존재하지 않는 번호를 입력하면, '해당 번호의 할 일이 없습니다.'와 같은 오류 메시지가 출력되어야 한다."
      covered_by_scenarios:
        - "TS-1-06"
    - item: "완료 처리 후 `list` 명령으로 조회 시 해당 할 일이 보이지 않아야 한다."
      covered_by_scenarios:
        - "TS-1-05"
  main_flow_steps:
    - item: "사용자가 'add' 명령어와 함께 추가할 할 일 내용을 입력하고 실행한다. (예: `todo add '장보기'`)."
      covered_by_scenarios:
        - "TS-1-01"
    - item: "시스템은 입력된 내용을 새로운 할 일로 저장한다."
      covered_by_scenarios:
        - "TS-1-01"
        - "TS-1-07"
    - item: "시스템은 '할 일이 추가되었습니다.'와 같은 성공 메시지를 출력한다."
      covered_by_scenarios:
        - "TS-1-01"
    - item: "사용자가 'list' 명령어를 입력하고 실행한다. (예: `todo list`)"
      covered_by_scenarios:
        - "TS-1-03"
        - "TS-1-04"
    - item: "시스템은 저장된 모든 할 일을 순번과 함께 읽어온다."
      covered_by_scenarios:
        - "TS-1-03"
        - "TS-1-07"
        - "TS-1-08"
    - item: "시스템은 조회된 목록을 형식에 맞게 화면에 출력한다."
      covered_by_scenarios:
        - "TS-1-03"
    - item: "사용자가 'complete' 명령어와 할 일 번호를 입력하고 실행한다. (예: `todo complete 1`)"
      covered_by_scenarios:
        - "TS-1-05"
    - item: "시스템은 해당 번호의 할 일을 목록에서 삭제한다."
      covered_by_scenarios:
        - "TS-1-05"
        - "TS-1-08"
    - item: "시스템은 '할 일이 완료되었습니다.'와 같은 성공 메시지를 출력한다."
      covered_by_scenarios:
        - "TS-1-05"
  preconditions:
    - item: "TODO 애플리케이션이 실행 가능한 상태이다."
      covered_by_scenarios:
        - "TS-1-01"
        - "TS-1-02"
        - "TS-1-03"
        - "TS-1-04"
        - "TS-1-05"
        - "TS-1-06"
        - "TS-1-07"
        - "TS-1-08"
    - item: "목록에 하나 이상의 할 일이 존재한다."
      covered_by_scenarios:
        - "TS-1-05"
  triggers:
    - item: "사용자가 'add' 명령어와 할 일 내용을 입력한다."
      covered_by_scenarios:
        - "TS-1-01"
        - "TS-1-02"
    - item: "사용자가 'list' 명령어를 입력한다."
      covered_by_scenarios:
        - "TS-1-03"
        - "TS-1-04"
    - item: "사용자가 'complete' 명령어와 완료할 할 일의 번호를 입력한다."
      covered_by_scenarios:
        - "TS-1-05"
        - "TS-1-06"
  observable_outcomes:
    - item: "새로운 할 일이 목록에 추가되고, 추가되었다는 확인 메시지가 출력된다."
      covered_by_scenarios:
        - "TS-1-01"
    - item: "현재 저장된 모든 할 일 목록이 순번과 함께 화면에 출력된다."
      covered_by_scenarios:
        - "TS-1-03"
    - item: "지정된 할 일이 목록에서 제거되고, 제거되었다는 확인 메시지가 출력된다."
      covered_by_scenarios:
        - "TS-1-05"

test_scenarios:
  - scenario_id: "TS-1-01"
    related_use_case_id: "UC-1-01"
    purpose: "새로운 할 일을 성공적으로 추가하고 목록에서 확인한다."
    setup: "TODO 애플리케이션 초기 상태 (데이터 파일이 존재하지 않거나 비어 있음)."
    action: |
      1. `todo add '장보기'` 명령 실행
      2. `todo list` 명령 실행
    expected_result: |
      1. "할 일이 추가되었습니다." 메시지가 출력된다.
      2. `todo list` 결과에 '1. 장보기'가 포함되어 출력된다.
    evidence_type: "runtime"
    runtime_evidence_required: true
    code_only_verification_allowed: false
  - scenario_id: "TS-1-02"
    related_use_case_id: "UC-1-01"
    purpose: "할 일 내용 없이 `add` 명령 실행 시 오류 메시지를 확인하고 목록이 변경되지 않음을 확인한다."
    setup: "TODO 애플리케이션 초기 상태 (데이터 파일이 존재하지 않거나 비어 있음)."
    action: |
      1. `todo add` 또는 `todo add ''` 명령 실행
      2. `todo list` 명령 실행
    expected_result: |
      1. "추가할 내용이 없습니다."와 같은 오류 메시지가 출력된다.
      2. `todo list` 결과에 "할 일이 없습니다." 메시지가 출력되거나 아무것도 출력되지 않아야 한다.
    evidence_type: "runtime"
    runtime_evidence_required: true
    code_only_verification_allowed: false
  - scenario_id: "TS-1-03"
    related_use_case_id: "UC-1-02"
    purpose: "기존 할 일들이 있을 때 `list` 명령으로 정확히 조회되는지 확인한다."
    setup: |
      1. `todo add '할 일 1'` 명령 실행
      2. `todo add '할 일 2'` 명령 실행
    action: |
      1. `todo list` 명령 실행
    expected_result: |
      `1. 할 일 1`
      `2. 할 일 2`
      와 같이 순번과 내용이 정확히 출력된다.
    evidence_type: "runtime"
    runtime_evidence_required: true
    code_only_verification_allowed: false
  - scenario_id: "TS-1-04"
    related_use_case_id: "UC-1-02"
    purpose: "저장된 할 일이 없을 때 `list` 명령으로 적절한 메시지가 출력되는지 확인한다."
    setup: "TODO 애플리케이션 초기 상태 (데이터 파일이 존재하지 않거나 비어 있음)."
    action: |
      1. `todo list` 명령 실행
    expected_result: |
      "할 일이 없습니다." 메시지가 출력된다.
    evidence_type: "runtime"
    runtime_evidence_required: true
    code_only_verification_allowed: false
  - scenario_id: "TS-1-05"
    related_use_case_id: "UC-1-03"
    purpose: "특정 번호의 할 일을 성공적으로 완료하고 목록에서 제거되었는지 확인한다."
    setup: |
      1. `todo add '첫 번째 할 일'` 명령 실행
      2. `todo add '두 번째 할 일'` 명령 실행
    action: |
      1. `todo complete 1` 명령 실행
      2. `todo list` 명령 실행
    expected_result: |
      1. "할 일이 완료되었습니다." 메시지가 출력된다.
      2. `todo list` 결과에 '첫 번째 할 일'은 제거되고 '1. 두 번째 할 일'만 존재해야 한다.
    evidence_type: "runtime"
    runtime_evidence_required: true
    code_only_verification_allowed: false
  - scenario_id: "TS-1-06"
    related_use_case_id: "UC-1-03"
    purpose: "존재하지 않는 할 일 번호로 완료를 시도했을 때 오류 메시지를 확인하고 목록이 변경되지 않음을 확인한다."
    setup: |
      1. `todo add '유일한 할 일'` 명령 실행
    action: |
      1. `todo complete 99` 명령 실행
      2. `todo list` 명령 실행
    expected_result: |
      1. "해당 번호의 할 일이 없습니다."와 같은 오류 메시지가 출력된다.
      2. `todo list` 결과에 '1. 유일한 할 일'이 여전히 존재해야 한다.
    evidence_type: "runtime"
    runtime_evidence_required: true
    code_only_verification_allowed: false
  - scenario_id: "TS-1-07"
    related_use_case_id: "UC-1-01"
    purpose: "할 일 추가 후 애플리케이션 재시작 시 데이터가 유지되는지 확인한다 (영속성)."
    setup: "TODO 애플리케이션 초기 상태 (데이터 파일이 존재하지 않거나 비어 있음)."
    action: |
      1. `todo add '지속될 할 일'` 명령 실행
      2. 애플리케이션 종료 및 재시작 (또는 프로세스 재실행)
      3. `todo list` 명령 실행
    expected_result: |
      `todo list` 결과에 '1. 지속될 할 일'이 존재해야 한다.
    evidence_type: "mixed"
    runtime_evidence_required: true
    code_only_verification_allowed: false
  - scenario_id: "TS-1-08"
    related_use_case_id: "UC-1-03"
    purpose: "할 일 완료 후 애플리케이션 재시작 시 변경사항(삭제)이 유지되는지 확인한다 (영속성)."
    setup: |
      1. `todo add '첫 번째'` 명령 실행
      2. `todo add '두 번째'` 명령 실행
    action: |
      1. `todo complete 1` 명령 실행
      2. 애플리케이션 종료 및 재시작 (또는 프로세스 재실행)
      3. `todo list` 명령 실행
    expected_result: |
      `todo list` 결과에 '첫 번째' 할 일은 없고 '1. 두 번째' 할 일만 존재해야 한다.
    evidence_type: "mixed"
    runtime_evidence_required: true
    code_only_verification_allowed: false

coverage_summary:
  uncovered_items:
    - "N/A - 모든 Use Case의 main flow, alternate flows, acceptance criteria 및 test_focus에 명시된 영속성 기능이 시나리오로 커버되었습니다."
  design_notes:
    - "CLI 환경임을 고려하여, 모든 시나리오는 명령줄 출력 결과를 주요 증거로 삼으며, 영속성 테스트는 파일 시스템 확인을 포함하는 mixed evidence type을 사용합니다."
    - "각 Use Case별로 성공 케이스와 예외/오류 케이스를 최소 하나씩 포함하도록 시나리오를 설계했습니다."
    - "TODO 애플리케이션의 데이터 저장은 파일 기반으로 가정하며, 재시작 후에도 상태 유지를 검증하는 시나리오를 추가했습니다."