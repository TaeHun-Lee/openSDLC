    content: |
      import sys
      import json
      import os

      TODO_FILE = "todo.json"

      def load_tasks():
          """Loads tasks from the TODO_FILE. Returns an empty list if the file doesn't exist."""
          if not os.path.exists(TODO_FILE):
              return []
          try:
              with open(TODO_FILE, 'r', encoding='utf-8') as f:
                  tasks = json.load(f)
                  return tasks if isinstance(tasks, list) else []
          except (json.JSONDecodeError, FileNotFoundError):
              return []

      def save_tasks(tasks):
          """Saves the list of tasks to the TODO_FILE."""
          with open(TODO_FILE, 'w', encoding='utf-8') as f:
              json.dump(tasks, f, ensure_ascii=False, indent=4)

      def add_task(task_description):
          """Adds a new task."""
          if not task_description:
              print("추가할 내용이 없습니다.")
              return

          tasks = load_tasks()
          tasks.append(task_description)
          save_tasks(tasks)
          print("할 일이 추가되었습니다.")

      def list_tasks():
          """Lists all tasks."""
          tasks = load_tasks()
          if not tasks:
              print("할 일이 없습니다.")
          else:
              for i, task in enumerate(tasks, 1):
                  print(f"{i}. {task}")

      def complete_task(task_number_str):
          """Completes a task by its number."""
          tasks = load_tasks()
          
          try:
              task_number = int(task_number_str)
          except ValueError:
              print("숫자를 입력해야 합니다.")
              return

          if 1 <= task_number <= len(tasks):
              # User sees 1-based index, list is 0-based
              tasks.pop(task_number - 1)
              save_tasks(tasks)
              print("할 일이 완료되었습니다.")
          else:
              print("해당 번호의 할 일이 없습니다.")

      def main():
          """Main function to handle command-line arguments."""
          args = sys.argv[1:]
          
          if not args:
              print("사용법: todo.py [add|list|complete] [arguments]")
              return

          command = args[0]
          
          if command == "add":
              if len(args) > 1:
                  add_task(" ".join(args[1:]))
              else:
                  # Handles "todo add" with no content
                  add_task("")
          elif command == "list":
              list_tasks()
          elif command == "complete":
              if len(args) > 1:
                  complete_task(args[1])
              else:
                  # Handles "todo complete" with no number
                  print("완료할 할 일의 번호를 입력하세요.")
          else:
              print(f"알 수 없는 명령어: {command}")
              print("사용법: todo.py [add|list|complete] [arguments]")


      if __name__ == "__main__":
          main()