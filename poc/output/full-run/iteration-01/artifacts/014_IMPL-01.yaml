code_files:
  - path: "workspace/lotto-app/index.html"
    language: "html"
    content: |
      <!DOCTYPE html>
      <html lang="ko">
      <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>로또 번호 생성기</title>
          <link rel="stylesheet" href="style.css">
      </head>
      <body>
          <div class="lotto-container">
              <h1>로또 번호 생성기</h1>
              <div id="lotto-numbers" class="lotto-numbers-container">
                  <p>버튼을 눌러 번호를 생성하세요.</p>
              </div>
              <button id="generate-btn">번호 생성</button>
          </div>
          <script src="script.js"></script>
      </body>
      </html>
  - path: "workspace/lotto-app/style.css"
    language: "css"
    content: |
      body {
          font-family: Arial, sans-serif;
          background-color: #f0f2f5;
          display: flex;
          justify-content: center;
          align-items: center;
          height: 100vh;
          margin: 0;
      }

      .lotto-container {
          background-color: white;
          padding: 2rem;
          border-radius: 10px;
          box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
          text-align: center;
      }

      h1 {
          color: #333;
          margin-bottom: 1.5rem;
      }

      .lotto-numbers-container {
          display: flex;
          justify-content: center;
          gap: 10px;
          margin-bottom: 2rem;
          min-height: 50px;
          align-items: center;
      }

      .lotto-numbers-container p {
          color: #888;
      }

      .lotto-number {
          display: flex;
          justify-content: center;
          align-items: center;
          width: 45px;
          height: 45px;
          border-radius: 50%;
          color: white;
          font-size: 1.2rem;
          font-weight: bold;
      }

      #generate-btn {
          background-color: #007bff;
          color: white;
          border: none;
          padding: 12px 24px;
          font-size: 1rem;
          border-radius: 5px;
          cursor: pointer;
          transition: background-color 0.3s ease;
      }

      #generate-btn:hover {
          background-color: #0056b3;
      }
  - path: "workspace/lotto-app/script.js"
    language: "javascript"
    content: |
      const generateBtn = document.getElementById('generate-btn');
      const numbersContainer = document.getElementById('lotto-numbers');

      generateBtn.addEventListener('click', () => {
          const lottoNumbers = generateUniqueNumbers(6, 1, 45);
          const sortedNumbers = lottoNumbers.sort((a, b) => a - b);
          displayNumbers(sortedNumbers);
      });

      function generateUniqueNumbers(count, min, max) {
          const numbers = new Set();
          while (numbers.size < count) {
              const randomNumber = Math.floor(Math.random() * (max - min + 1)) + min;
              numbers.add(randomNumber);
          }
          return Array.from(numbers);
      }

      function displayNumbers(numbers) {
          numbersContainer.innerHTML = ''; // Clear previous numbers
          numbers.forEach(number => {
              const numberElement = document.createElement('div');
              numberElement.className = 'lotto-number';
              numberElement.textContent = number;
              numberElement.style.backgroundColor = getNumberColor(number);
              numbersContainer.appendChild(numberElement);
          });
      }

      function getNumberColor(number) {
          if (number <= 10) return '#fbc400'; // 노란색
          if (number <= 20) return '#69c8f2'; // 파란색
          if (number <= 30) return '#ff7272'; // 빨간색
          if (number <= 40) return '#aaa';    // 회색
          return '#b0d840';                   // 녹색
      }