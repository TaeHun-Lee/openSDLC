summary: "클라이언트 사이드에서 순수 HTML, JavaScript를 사용하여 로또 번호를 생성하고 표시하는 애플리케이션"
instructions_for_next_agent: |
  아래 use case, acceptance criteria, scope, constraints를 기준으로
  UseCaseModelArtifact를 검증하라.
  검증 결과는 ValidationReportArtifact로 작성하라.

raw_user_request: |
  pure html & javascript로 구동 가능한 lotto 앱

user_story:
  as_a: "사용자"
  i_want: "로또 번호 생성 앱을 통해"
  so_that: "랜덤으로 생성된 로또 번호를 확인할 수 있다."

decomposition_basis:
  primary_user_intentions:
    - "로또 번호 생성 및 결과 확인"
  separated_failure_modes:
    - "번호가 생성되지 않는 경우"
  e2e_test_units:
    - "사용자가 생성 버튼을 클릭하여 화면에 표시된 6개의 숫자를 확인하는 전체 과정"

use_cases:
  - use_case_id: "UC-01-01"
    name: "로또 번호 생성 및 표시"
    primary_intent: "로또 번호 생성 및 결과 확인"
    goal: "사용자에게 1부터 45 사이의 중복되지 않는 6개 로또 번호를 생성하여 화면에 표시한다."
    actors:
      - "사용자"
    preconditions:
      - "사용자가 로또 앱 페이지에 접속해 있다."
    trigger: "사용자가 '번호 생성' 버튼을 클릭한다."
    observable_outcome: "화면에 6개의 로또 번호가 표시된다."
    main_flow:
      - "사용자가 '번호 생성' 버튼을 클릭한다."
      - "시스템은 1부터 45 사이의 숫자 중 중복되지 않는 6개의 숫자를 무작위로 선택한다."
      - "시스템은 선택된 6개의 숫자를 오름차순으로 정렬한다."
      - "시스템은 정렬된 번호를 화면의 지정된 영역에 표시한다."
    alternate_flows: []
    acceptance_criteria:
      - "'번호 생성' 버튼이 화면에 표시되어야 한다."
      - "버튼 클릭 시, 1부터 45 사이의 숫자 6개가 화면에 표시되어야 한다."
      - "표시된 6개의 숫자는 서로 중복되지 않아야 한다."
      - "표시된 6개의 숫자는 오름차순으로 정렬되어야 한다."
      - "버튼을 다시 클릭할 때마다 새로운 번호 조합이 생성되어 표시되어야 한다."

scope:
  in_scope:
    - "로또 번호 생성 및 화면 표시 기능"
  out_of_scope:
    - "사용자 번호 수동 입력 기능"
    - "생성된 번호와 실제 당첨 번호 비교 기능"
    - "과거에 생성된 번호 이력 저장 기능"
    - "서버와의 통신 또는 데이터베이스 연동"

constraints:
  - "서버 사이드 기술 없이 순수 HTML, CSS, JavaScript만으로 구현해야 한다."
  - "외부 라이브러리나 프레임워크 사용을 최소화한다."

test_focus:
  - "번호 생성 로직의 정확성 (범위: 1-45, 개수: 6, 중복 없음)"
  - "UI 상에 번호가 정상적으로 표시되는지 여부"
  - "버튼 클릭 이벤트가 정상적으로 동작하는지 여부"