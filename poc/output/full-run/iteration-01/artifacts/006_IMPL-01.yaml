code_files:
  - path: "workspace/lotto-app/index.html"
    language: "html"
    content: |
      <!DOCTYPE html>
      <html lang="ko">
      <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>로또 번호 생성기</title>
          <link rel="stylesheet" href="style.css">
      </head>
      <body>
          <div class="lotto-machine">
              <h1>로또 번호 생성기</h1>
              <div id="lotto-numbers" class="lotto-numbers-container">
                  <!-- 생성된 번호가 여기에 표시됩니다 -->
              </div>
              <button id="generate-btn">번호 생성</button>
          </div>
          <script src="script.js"></script>
      </body>
      </html>
  - path: "workspace/lotto-app/style.css"
    language: "css"
    content: |
      body {
          font-family: Arial, sans-serif;
          display: flex;
          justify-content: center;
          align-items: center;
          height: 100vh;
          background-color: #f0f2f5;
          margin: 0;
      }

      .lotto-machine {
          background: white;
          padding: 40px;
          border-radius: 10px;
          box-shadow: 0 4px 8px rgba(0,0,0,0.1);
          text-align: center;
      }

      h1 {
          color: #333;
          margin-bottom: 30px;
      }

      .lotto-numbers-container {
          display: flex;
          justify-content: center;
          gap: 10px;
          margin-bottom: 30px;
          min-height: 50px;
      }

      .lotto-number {
          display: flex;
          justify-content: center;
          align-items: center;
          width: 50px;
          height: 50px;
          border-radius: 50%;
          background-color: #4CAF50;
          color: white;
          font-size: 24px;
          font-weight: bold;
      }

      #generate-btn {
          padding: 15px 30px;
          font-size: 18px;
          color: white;
          background-color: #007bff;
          border: none;
          border-radius: 5px;
          cursor: pointer;
          transition: background-color 0.3s;
      }

      #generate-btn:hover {
          background-color: #0056b3;
      }
  - path: "workspace/lotto-app/script.js"
    language: "javascript"
    content: |
      document.addEventListener('DOMContentLoaded', () => {
          const generateBtn = document.getElementById('generate-btn');
          const numbersContainer = document.getElementById('lotto-numbers');

          generateBtn.addEventListener('click', generateAndDisplayNumbers);

          function generateAndDisplayNumbers() {
              // 1. 1부터 45 사이의 중복되지 않는 6개 숫자 생성
              const numbers = new Set();
              while (numbers.size < 6) {
                  const randomNumber = Math.floor(Math.random() * 45) + 1;
                  numbers.add(randomNumber);
              }

              // 2. 오름차순으로 정렬
              const sortedNumbers = Array.from(numbers).sort((a, b) => a - b);

              // 3. 화면에 표시
              displayNumbers(sortedNumbers);
          }

          function displayNumbers(numbers) {
              // 이전 번호 삭제
              numbersContainer.innerHTML = '';

              // 새 번호 추가
              numbers.forEach(number => {
                  const numberElement = document.createElement('div');
                  numberElement.className = 'lotto-number';
                  numberElement.textContent = number;
                  numbersContainer.appendChild(numberElement);
              });
          }
      });