artifact_id: "UC-1"
artifact_type: "UseCaseModelArtifact"
iteration: 1
created_by: "ReqAgent"
created_at: "2024-07-29T11:00:00Z"
source_artifact_ids: []
status: "draft"
summary: "사용자가 할 일을 관리할 수 있는 간단한 명령줄 인터페이스(CLI) 기반의 TODO 애플리케이션"
instructions_for_next_agent: |
  아래 use case, acceptance criteria, scope, constraints를 기준으로
  UseCaseModelArtifact를 검증하라.
  검증 결과는 ValidationReportArtifact로 작성하라.

raw_user_request: |
  TODO CLI 앱

user_story:
  as_a: "사용자"
  i_want: "간단한 TODO 목록을 관리할 수 있는 CLI 애플리케이션을"
  so_that: "명령줄 환경에서 나의 할 일을 효율적으로 추적하고 관리할 수 있도록"

decomposition_basis:
  primary_user_intentions:
    - "할 일 추가"
    - "할 일 목록 조회"
    - "할 일 완료/삭제"
  separated_failure_modes:
    - "존재하지 않는 할 일을 완료 시도"
    - "내용 없이 할 일 추가 시도"
  e2e_test_units:
    - "사용자가 새 할 일을 추가하고 목록에서 확인"
    - "사용자가 기존 할 일을 완료하고 목록에서 제거되었는지 확인"
    - "사용자가 현재 모든 할 일 목록을 조회"

use_cases:
  - use_case_id: "UC-1-01"
    name: "새로운 할 일 추가"
    primary_intent: "할 일 추가"
    goal: "사용자가 새로운 할 일을 목록에 추가한다."
    actors:
      - "사용자"
    preconditions:
      - "TODO 애플리케이션이 실행 가능한 상태이다."
    trigger: "사용자가 'add' 명령어와 할 일 내용을 입력한다."
    observable_outcome: "새로운 할 일이 목록에 추가되고, 추가되었다는 확인 메시지가 출력된다."
    main_flow:
      - "사용자가 'add' 명령어와 함께 추가할 할 일 내용을 입력하고 실행한다. (예: `todo add '장보기'`)."
      - "시스템은 입력된 내용을 새로운 할 일로 저장한다."
      - "시스템은 '할 일이 추가되었습니다.'와 같은 성공 메시지를 출력한다."
    alternate_flows:
      - "할 일 내용이 비어 있을 경우, 시스템은 오류 메시지를 출력하고 할 일을 추가하지 않는다."
    acceptance_criteria:
      - "`add '내용'` 형식으로 명령을 실행하면 할 일이 추가되어야 한다."
      - "추가된 할 일은 목록 조회 시 마지막에 나타나야 한다."
      - "할 일 내용 없이 `add` 명령만 실행하면, '추가할 내용이 없습니다.'와 같은 오류 메시지가 출력되어야 한다."

  - use_case_id: "UC-1-02"
    name: "전체 할 일 목록 조회"
    primary_intent: "할 일 목록 조회"
    goal: "사용자가 현재 저장된 모든 할 일 목록을 확인한다."
    actors:
      - "사용자"
    preconditions:
      - "TODO 애플리케이션이 실행 가능한 상태이다."
    trigger: "사용자가 'list' 명령어를 입력한다."
    observable_outcome: "현재 저장된 모든 할 일 목록이 순번과 함께 화면에 출력된다."
    main_flow:
      - "사용자가 'list' 명령어를 입력하고 실행한다. (예: `todo list`)"
      - "시스템은 저장된 모든 할 일을 순번과 함께 읽어온다."
      - "시스템은 조회된 목록을 형식에 맞게 화면에 출력한다."
    alternate_flows:
      - "저장된 할 일이 없을 경우, '할 일이 없습니다.'와 같은 메시지를 출력한다."
    acceptance_criteria:
      - "`list` 명령을 실행하면 저장된 모든 할 일이 번호와 함께 출력되어야 한다."
      - "할 일이 없는 경우 '할 일이 없습니다.' 메시지가 출력되어야 한다."

  - use_case_id: "UC-1-03"
    name: "할 일 완료 처리"
    primary_intent: "할 일 완료/삭제"
    goal: "사용자가 지정된 번호의 할 일을 목록에서 제거(완료)한다."
    actors:
      - "사용자"
    preconditions:
      - "목록에 하나 이상의 할 일이 존재한다."
    trigger: "사용자가 'complete' 명령어와 완료할 할 일의 번호를 입력한다."
    observable_outcome: "지정된 할 일이 목록에서 제거되고, 제거되었다는 확인 메시지가 출력된다."
    main_flow:
      - "사용자가 'complete' 명령어와 할 일 번호를 입력하고 실행한다. (예: `todo complete 1`)"
      - "시스템은 해당 번호의 할 일을 목록에서 삭제한다."
      - "시스템은 '할 일이 완료되었습니다.'와 같은 성공 메시지를 출력한다."
    alternate_flows:
      - "존재하지 않는 번호를 입력할 경우, 시스템은 오류 메시지를 출력하고 목록을 변경하지 않는다."
    acceptance_criteria:
      - "`complete <번호>` 형식으로 명령을 실행하면 해당 번호의 할 일이 목록에서 제거되어야 한다."
      - "존재하지 않는 번호를 입력하면, '해당 번호의 할 일이 없습니다.'와 같은 오류 메시지가 출력되어야 한다."
      - "완료 처리 후 `list` 명령으로 조회 시 해당 할 일이 보이지 않아야 한다."

scope:
  in_scope:
    - "할 일 추가 기능"
    - "할 일 목록 조회 기능"
    - "할 일 완료(삭제) 기능"
    - "데이터는 파일 기반으로 영속성 유지"
  out_of_scope:
    - "할 일 수정 기능"
    - "할 일 우선순위 설정"
    - "할 일 마감일 설정"
    - "그래픽 사용자 인터페이스 (GUI)"

constraints:
  - "CLI(Command-Line Interface) 환경에서만 동작해야 한다."
  - "별도의 데이터베이스 없이 파일 시스템(예: `JSON` 파일)을 사용하여 데이터를 저장한다."

test_focus:
  - "명령어(`add`, `list`, `complete`)별 기능의 정상 동작 여부"
  - "존재하지 않는 할 일에 대한 예외 처리 (e.g., `complete 99`)"
  - "입력값이 없을 때의 예외 처리 (e.g., `add`)"
  - "데이터가 애플리케이션 재시작 후에도 유지되는지 (영속성)"