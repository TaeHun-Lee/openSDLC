code_files:
  - path: "todo.py"
    language: "python"
    content: |
      #!/usr/bin/env python3
      import sys
      import json
      import os

      TODO_FILE = "todo.json"

      class TodoManager:
          def __init__(self, filepath):
              self.filepath = filepath
              self.tasks = self._load_tasks()

          def _load_tasks(self):
              if not os.path.exists(self.filepath):
                  return []
              try:
                  with open(self.filepath, 'r', encoding='utf-8') as f:
                      return json.load(f)
              except (json.JSONDecodeError, FileNotFoundError):
                  return []

          def _save_tasks(self):
              with open(self.filepath, 'w', encoding='utf-8') as f:
                  json.dump(self.tasks, f, ensure_ascii=False, indent=2)

          def add_task(self, content):
              self.tasks.append(content)
              self._save_tasks()
              print("할 일이 추가되었습니다.")

          def list_tasks(self):
              if not self.tasks:
                  print("할 일이 없습니다.")
                  return
              for i, task in enumerate(self.tasks, 1):
                  print(f"{i}. {task}")

          def complete_task(self, task_number):
              try:
                  # User input is 1-based, list index is 0-based
                  index = int(task_number) - 1
                  if index < 0 or index >= len(self.tasks):
                      raise IndexError
                  self.tasks.pop(index)
                  self._save_tasks()
                  print("할 일이 완료되었습니다.")
              except (ValueError, IndexError):
                  print("해당 번호의 할 일이 없습니다.")

      def main():
          manager = TodoManager(TODO_FILE)
          args = sys.argv
          
          if len(args) < 2:
              print("사용법: python3 todo.py [add|list|complete] [arguments]")
              return

          command = args[1]

          if command == 'add':
              if len(args) > 2 and args[2]:
                  content = args[2]
                  manager.add_task(content)
              else:
                  print("추가할 내용이 없습니다.")
          elif command == 'list':
              manager.list_tasks()
          elif command == 'complete':
              if len(args) > 2:
                  task_number = args[2]
                  manager.complete_task(task_number)
              else:
                  print("완료할 할 일의 번호를 입력하세요.")
          else:
              print(f"알 수 없는 명령어입니다: {command}")

      if __name__ == "__main__":
          main()

