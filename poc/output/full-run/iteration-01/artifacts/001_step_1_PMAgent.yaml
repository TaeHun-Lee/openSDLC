[PMAgent] 지금부터 Iteration 01에 대한 최종 평가 보고서 작성을 시작합니다. 주요 작업은 아래와 같습니다.
- Iteration 01 동안 생성된 모든 산출물(UC, TD, IMPL, TEST, FB) 및 검증 결과(VAL)를 종합합니다.
- 품질 지표(테스트 통과율, 만족도 점수)를 분석하여 Iteration의 성공 여부를 판단합니다.
- 분석 결과를 바탕으로 `iteration_assessment_01.md` 보고서를 생성하고, 사용자에게 다음 행동(프로젝트 종료 승인 또는 신규 요구사항 입력)을 요청합니다.

[PMAgent] 모든 산출물과 검증 보고서 분석을 완료했습니다. 만족도 점수가 100점으로 기준점(90점)을 상회하여 Iteration 목표를 성공적으로 달성한 것으로 판단됩니다. 이제 최종 평가 보고서를 생성합니다.

[PMAgent] 작업을 완료했습니다. 생성된 산출물은 `workspace/App/iteration-01/reports/iteration_assessment_01.md` 입니다.
사용자께서는 보고서 내용을 검토하신 후, 프로젝트 종료 승인 또는 다음 Iteration 진행을 위한 추가 요구사항을 입력해 주시기 바랍니다.