artifact_id: "TD-01"
artifact_type: "TestDesignArtifact"
iteration: 1
created_by: "TestAgent"
created_at: "2023-11-20T10:00:00Z"
source_artifact_ids:
  - "UC-01"
status: "draft"
summary: "로또 번호 생성 및 표시 기능에 대한 테스트 설계"
instructions_for_next_agent: |
  TestDesignArtifact를 검증하라.
  coverage completeness, scenario quality, evidence type 정의를 확인하라.
  검증 결과는 ValidationReportArtifact로 작성하라.

test_design_scope:
  use_case_ids:
    - "UC-01-01"

coverage_plan:
  acceptance_criteria:
    - item: "'번호 생성' 버튼이 화면에 표시되어야 한다."
      covered_by_scenarios:
        - "TS-01-01"
    - item: "버튼 클릭 시, 1부터 45 사이의 숫자 6개가 화면에 표시되어야 한다."
      covered_by_scenarios:
        - "TS-01-02"
        - "TS-01-03"
    - item: "표시된 6개의 숫자는 서로 중복되지 않아야 한다."
      covered_by_scenarios:
        - "TS-01-03"
    - item: "표시된 6개의 숫자는 오름차순으로 정렬되어야 한다."
      covered_by_scenarios:
        - "TS-01-04"
    - item: "버튼을 다시 클릭할 때마다 새로운 번호 조합이 생성되어 표시되어야 한다."
      covered_by_scenarios:
        - "TS-01-05"
  main_flow_steps:
    - item: "사용자가 '번호 생성' 버튼을 클릭한다."
      covered_by_scenarios:
        - "TS-01-02"
    - item: "시스템은 1부터 45 사이의 숫자 중 중복되지 않는 6개의 숫자를 무작위로 선택한다."
      covered_by_scenarios:
        - "TS-01-03"
    - item: "시스템은 선택된 6개의 숫자를 오름차순으로 정렬한다."
      covered_by_scenarios:
        - "TS-01-04"
    - item: "시스템은 정렬된 번호를 화면의 지정된 영역에 표시한다."
      covered_by_scenarios:
        - "TS-01-02"
        - "TS-01-04"
  preconditions:
    - item: "사용자가 로또 앱 페이지에 접속해 있다."
      covered_by_scenarios:
        - "TS-01-01"
  triggers:
    - item: "사용자가 '번호 생성' 버튼을 클릭한다."
      covered_by_scenarios:
        - "TS-01-02"
        - "TS-01-05"
  observable_outcomes:
    - item: "화면에 6개의 로또 번호가 표시된다."
      covered_by_scenarios:
        - "TS-01-02"

test_scenarios:
  - scenario_id: "TS-01-01"
    related_use_case_id: "UC-01-01"
    purpose: "초기 페이지 로드 시 '번호 생성' 버튼 표시 여부 확인"
    setup: "웹 브라우저에서 로또 앱 페이지에 접속한다."
    action: "페이지 로드 완료 후 화면을 관찰한다."
    expected_result: "'번호 생성' 버튼이 화면에 명확하게 표시되어야 한다."
    evidence_type: "runtime"
    runtime_evidence_required: true
    code_only_verification_allowed: false
  - scenario_id: "TS-01-02"
    related_use_case_id: "UC-01-01"
    purpose: "'번호 생성' 버튼 클릭 시 6개의 로또 번호가 화면에 표시되는지 확인"
    setup: "로또 앱 페이지에 접속 후 '번호 생성' 버튼이 보이는 상태에서 시작한다."
    action: "'번호 생성' 버튼을 클릭한다."
    expected_result: "화면에 6개의 숫자가 표시되어야 하며, 이 숫자들이 텍스트 형태로 보여야 한다."
    evidence_type: "runtime"
    runtime_evidence_required: true
    code_only_verification_allowed: false
  - scenario_id: "TS-01-03"
    related_use_case_id: "UC-01-01"
    purpose: "생성된 로또 번호의 유효 범위(1~45) 및 중복 없음 확인"
    setup: "TS-01-02 시나리오를 통해 6개의 로또 번호가 화면에 표시된 상태이다."
    action: "표시된 6개의 숫자를 확인한다."
    expected_result: "모든 숫자가 1부터 45 사이에 있어야 하며, 6개의 숫자는 서로 중복되지 않아야 한다."
    evidence_type: "runtime"
    runtime_evidence_required: true
    code_only_verification_allowed: false
  - scenario_id: "TS-01-04"
    related_use_case_id: "UC-01-01"
    purpose: "생성된 로또 번호가 오름차순으로 정렬되어 표시되는지 확인"
    setup: "TS-01-02 시나리오를 통해 6개의 로또 번호가 화면에 표시된 상태이다."
    action: "표시된 6개의 숫자의 순서를 확인한다."
    expected_result: "표시된 숫자들이 왼쪽에서 오른쪽으로 오름차순으로 정렬되어야 한다."
    evidence_type: "runtime"
    runtime_evidence_required: true
    code_only_verification_allowed: false
  - scenario_id: "TS-01-05"
    related_use_case_id: "UC-01-01"
    purpose: "'번호 생성' 버튼을 다시 클릭할 때 새로운 번호 조합이 생성되는지 확인"
    setup: "TS-01-02 시나리오를 통해 한 번 로또 번호가 생성되어 표시된 상태이다."
    action: "'번호 생성' 버튼을 다시 클릭한다."
    expected_result: "이전에 표시되었던 번호 조합과 다른 새로운 6개의 번호 조합이 화면에 표시되어야 한다."
    evidence_type: "runtime"
    runtime_evidence_required: true
    code_only_verification_allowed: false

coverage_summary:
  uncovered_items:
    - "N/A"
  design_notes:
    - "모든 UseCaseModelArtifact의 acceptance criteria, main flow, preconditions, trigger, observable outcomes가 테스트 시나리오에 의해 커버되었다."
    - "모든 시나리오는 클라이언트 사이드 앱의 특성상 런타임 환경에서의 UI 관찰을 주된 증거 수집 방식으로 요구한다."