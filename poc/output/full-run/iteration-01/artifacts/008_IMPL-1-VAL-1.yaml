violations:
  - rule: "Implementation Correctness"
    severity: "high"
    description: "할 일 완료 기능(`complete_task`)이 리스트의 동적 인덱스를 사용하여 항목을 삭제합니다. 이로 인해 `list` 명령어로 확인한 번호를 기준으로 여러 항목을 순차적으로 완료 처리할 경우, 첫 항목 삭제 후 인덱스가 변경되어 의도치 않은 항목이 삭제되거나 오류가 발생합니다."
    recommended_action: "삭제 로직을 현재의 동적 인덱스 방식에서 각 할 일의 고유 식별자(ID)를 사용하는 방식으로 변경해야 합니다. 또는 사용자가 입력한 번호가 현재 데이터 상태와 일치하는지 확인하는 더 안정적인 방법으로 리팩토링해야 합니다."

