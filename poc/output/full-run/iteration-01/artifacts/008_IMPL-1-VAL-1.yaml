checks:
  - check_name: "schema"
    result: "pass"
    evidence: "산출물이 ImplementationArtifact 스키마를 준수함."
  - check_name: "traceability"
    result: "pass"
    evidence: "source_artifact_ids가 명시되어 있고, implementation_target과 traceability 섹션이 일관되게 연결됨."
  - check_name: "role_boundary"
    result: "pass"
    evidence: "CodeAgent가 구현 역할에 국한된 산출물을 생성했으며, 요구사항을 임의로 변경하지 않음."
  - check_name: "scope_adherence"
    result: "pass"
    evidence: "산출물에 명시된 모든 기능(add, list, complete)이 코드에 구현됨."
  - check_name: "implementation_consistency"
    result: "fail"
    evidence: "제공된 코드의 `complete_task` 로직에 심각한 결함이 존재함. 이로 인해 산출물의 설명과 실제 동작 간에 불일치가 발생함."

