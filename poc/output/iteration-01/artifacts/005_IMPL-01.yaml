code_files:
  - path: "workspace/LottoApp/index.html"
    language: "html"
    content: |
      <!DOCTYPE html>
      <html lang="en">
      <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Lotto Number Generator</title>
          <link rel="stylesheet" href="style.css">
      </head>
      <body>
          <h1>Lotto Number Generator</h1>
          <button id="generateLottoBtn">번호 생성</button>
          <div id="lottoNumbers"></div>
          <script src="script.js"></script>
      </body>
      </html>

  - path: "workspace/LottoApp/style.css"
    language: "css"
    content: |
      body {
          font-family: Arial, sans-serif;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
          margin: 0;
          background-color: #f4f4f4;
          color: #333;
      }

      h1 {
          color: #0056b3;
          margin-bottom: 20px;
      }

      button {
          padding: 10px 20px;
          font-size: 1.1em;
          background-color: #007bff;
          color: white;
          border: none;
          border-radius: 5px;
          cursor: pointer;
          transition: background-color 0.3s ease;
          margin-bottom: 30px;
          box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      }

      button:hover {
          background-color: #0056b3;
      }

      #lottoNumbers {
          display: flex;
          gap: 15px;
          flex-wrap: wrap;
          justify-content: center;
          min-height: 50px; /* To prevent layout shift initially */
          width: 100%;
          max-width: 600px; /* Limit width for better readability */
      }

      .lotto-number {
          width: 50px;
          height: 50px;
          background-color: #f0ad4e;
          color: white;
          border-radius: 50%;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 1.5em;
          font-weight: bold;
          box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      }

  - path: "workspace/LottoApp/script.js"
    language: "javascript"
    content: |
      document.addEventListener('DOMContentLoaded', () => {
          const generateBtn = document.getElementById('generateLottoBtn');
          const lottoNumbersDiv = document.getElementById('lottoNumbers');

          generateBtn.addEventListener('click', () => {
              const numbers = generateLottoNumbers();
              displayLottoNumbers(numbers);
          });

          /**
           * 1에서 45 사이의 고유한 로또 번호 6개를 생성합니다.
           * @returns {number[]} 생성된 로또 번호 배열
           */
          function generateLottoNumbers() {
              const lottoSet = new Set();
              while (lottoSet.size < 6) {
                  const randomNumber = Math.floor(Math.random() * 45) + 1; // 1부터 45까지
                  lottoSet.add(randomNumber);
              }
              return Array.from(lottoSet).sort((a, b) => a - b); // 오름차순 정렬
          }

          /**
           * 생성된 로또 번호를 웹 페이지에 표시합니다.
           * @param {number[]} numbers - 표시할 로또 번호 배열
           */
          function displayLottoNumbers(numbers) {
              lottoNumbersDiv.innerHTML = ''; // 이전 번호 초기화
              numbers.forEach(number => {
                  const numberDiv = document.createElement('div');
                  numberDiv.classList.add('lotto-number');
                  numberDiv.textContent = number;
                  lottoNumbersDiv.appendChild(numberDiv);
              });
          }
      });