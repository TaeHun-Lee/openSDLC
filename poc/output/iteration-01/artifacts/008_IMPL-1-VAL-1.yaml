validation_result: "fail"

checks:
  - check_name: "schema"
    result: "pass"
    evidence: "All required fields from the ImplementationArtifact template are present and correctly structured."
  - check_name: "traceability"
    result: "fail"
    evidence: "The 'traceability' section contains incorrect line number references, breaking the link between use cases and code. For example, the toggle logic in `script.js` is cited as lines 34-44 but is actually located at lines 48-51."
  - check_name: "role_boundary"
    result: "pass"
    evidence: "The CodeAgent produced an ImplementationArtifact, which is within its designated role."
  - check_name: "evidence"
    result: "fail"
    evidence: "Evidence provided for traceability (line numbers) is factually incorrect for multiple items. See violation details."
  - check_name: "scope_adherence"
    result: "warning"
    evidence: "The implementation includes a feature ('Add todo with Enter key') not explicitly listed in `implemented_features`, which is a minor violation of the 'Strict Adherence' principle."
  - check_name: "implementation_consistency"
    result: "pass"
    evidence: "The implemented code is consistent with the high-level features described in the `implemented_features` list."

stage_check_guidance:
  common_required_checks:
    - "schema"
    - "traceability"
    - "evidence"
    - "decision_consistency"
    - "role_boundary"
    - "no_regression"
  UC:
    required_checks:
      - "scope_clarity"
      - "acceptance_criteria_testability"
      - "instruction_completeness"
      - "e2e_decomposition_quality"
      - "failure_mode_separation"
  IMPL:
    required_checks:
      - "scope_adherence"
      - "implementation_consistency"
  TEST-DESIGN:
    required_checks:
      - "acceptance_criteria_coverage"
      - "main_flow_coverage"
      - "precondition_coverage"
      - "trigger_coverage"
      - "observable_outcome_coverage"
      - "scenario_quality"
      - "evidence_type_definition"
  TEST-EXECUTION:
    required_checks:
      - "test_design_traceability"
      - "scenario_execution_completeness"
      - "evidence_quality"
