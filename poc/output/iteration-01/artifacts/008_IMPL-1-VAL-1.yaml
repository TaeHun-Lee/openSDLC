violations:
  - rule: "Evidence Accuracy"
    severity: "high"
    description: "Traceability-Implement 매핑에 기술된 일부 파일의 라인 번호가 실제 코드의 위치와 일치하지 않습니다. 예: `style.css`의 `li.completed` 스타일(문서: 54-57, 실제: 80-83), `script.js`의 토글 기능(문서: 34-44, 실제: 48-51), `script.js`의 삭제 기능(문서: 45-48, 실제: 54-57)."
    recommended_action: "CodeAgent는 `files_changed`에 명시된 파일들의 내용을 다시 확인하여 `traceability` 섹션의 모든 라인 번호를 실제 코드와 정확히 일치하도록 수정해야 합니다."

warnings:
  - "요구사항에 명시되지 않은 'Enter 키로 할 일 추가' 기능이 구현되었습니다. 이는 'Strict Adherence' 원칙 위반에 해당할 수 있습니다."

next_action:
  action: "rework"
  target_agent: "CodeAgent"
  reason: "증거 데이터(라인 번호) 불일치로 인한 추적성 위반."

blocking_reason: "The evidence provided in the `traceability` section is inaccurate, making downstream verification unreliable and breaking OpenSDLC's core principle of Full Traceability."
rework_target_artifact_id: "IMPL-1"

action_rules:
  allowed_actions:
    - "proceed"
    - "rework"
    - "hold"
  mapping:
    pass: "proceed"
    warning: "pma_decides_proceed_or_hold"
    fail: "rework"
  warning_allowed_actions:
    - "proceed"
    - "hold"

status_rules:
  mapping:
    pass: "approved"
    warning: "actionable"
    fail: "feedback-required"
  interpretation:
    approved: "Validation passed and the artifact is approved for downstream progression."
    actionable: "Validation found non-blocking risk that remains visible while PMAgent decides whether to proceed or hold."
    feedback-required: "Validation failed and the producing agent must rework the source artifact before safe progression."