test_scenarios:
  - scenario_id: "TS-01-01"
    related_use_case_id: "UC-01-01"
    purpose: "사용자가 '번호 생성' 버튼 클릭 시, 1~45 범위의 고유한 6개 로또 번호가 생성되어 웹 페이지에 올바르게 표시되는지 확인한다."
    setup: |
      1. 로또 애플리케이션 HTML 파일이 웹 브라우저에 로드되어 '번호 생성' 버튼이 표시되는 초기 상태를 확인한다.
      2. 개발자 도구(Console)를 열어 잠재적인 JavaScript 오류를 모니터링할 준비를 한다.
    action: |
      1. 웹 페이지에 표시된 '번호 생성' 버튼을 클릭한다.
    expected_result: |
      1. 웹 페이지 내 지정된 영역에 6개의 숫자가 명확하게 표시되어야 한다.
      2. 표시된 6개의 숫자는 모두 서로 중복되지 않아야 한다.
      3. 표시된 각 숫자는 1 이상 45 이하의 정수여야 한다.
      4. 개발자 도구(Console)에 오류 메시지가 발생하지 않아야 한다.
    evidence_type: "runtime"
    runtime_evidence_required: true
    code_only_verification_allowed: false

coverage_summary:
  uncovered_items:
    - "N/A - 모든 acceptance criteria, main flow, preconditions, triggers, observable outcomes이 시나리오에 의해 커버됨."
  design_notes:
    - "단순 로또 번호 생성 기능이므로, 단일 시나리오로 핵심 요구사항을 모두 커버하도록 설계함."
    - "생성된 번호의 유효성(개수, 범위, 중복 여부)을 런타임 검증에 중점을 두어 확인한다."
    - "UI 상에 번호가 명확히 표시되는지 육안 확인 및 개발자 도구를 통한 값 확인을 증거로 채택한다."