code_files:
  - path: "index.html"
    language: "html"
    content: |
      <!DOCTYPE html>
      <html lang="ko">
      <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>To-Do App</title>
          <link rel="stylesheet" href="css/style.css">
      </head>
      <body>

          <div class="todo-container">
              <header>
                  <h1>To-Do List</h1>
              </header>
              <section class="input-section">
                  <input type="text" id="todo-input" placeholder="새로운 할 일을 입력하세요...">
                  <button id="add-button">추가</button>
              </section>
              <section class="list-section">
                  <ul id="todo-list">
                      <!-- 할 일 항목이 여기에 추가됩니다 -->
                  </ul>
              </section>
          </div>

          <script src="js/app.js"></script>
      </body>
      </html>
  - path: "css/style.css"
    language: "css"
    content: |
      body {
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
          background-color: #f4f4f9;
          margin: 0;
          padding: 20px;
          display: flex;
          justify-content: center;
          align-items: flex-start;
          min-height: 100vh;
      }

      .todo-container {
          background: #fff;
          padding: 30px;
          border-radius: 8px;
          box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
          width: 100%;
          max-width: 500px;
      }

      header h1 {
          color: #333;
          text-align: center;
          margin-top: 0;
          margin-bottom: 20px;
      }

      .input-section {
          display: flex;
          gap: 10px;
          margin-bottom: 20px;
      }

      #todo-input {
          flex-grow: 1;
          padding: 10px 15px;
          border: 1px solid #ddd;
          border-radius: 4px;
          font-size: 16px;
      }

      #add-button {
          padding: 10px 20px;
          border: none;
          background-color: #007bff;
          color: white;
          border-radius: 4px;
          cursor: pointer;
          font-size: 16px;
          transition: background-color 0.2s;
      }

      #add-button:hover {
          background-color: #0056b3;
      }

      #todo-list {
          list-style: none;
          padding: 0;
          margin: 0;
      }

      #todo-list li {
          background: #f9f9f9;
          padding: 15px;
          border-bottom: 1px solid #eee;
          display: flex;
          justify-content: space-between;
          align-items: center;
          cursor: pointer;
          transition: background-color 0.2s;
      }

      #todo-list li:hover {
          background-color: #f0f0f0;
      }

      #todo-list li span {
          flex-grow: 1;
      }

      #todo-list li.completed span {
          text-decoration: line-through;
          color: #999;
      }

      .delete-btn {
          background-color: #dc3545;
          color: white;
          border: none;
          padding: 5px 12px;
          border-radius: 4px;
          cursor: pointer;
          font-size: 14px;
          margin-left: 10px;
          transition: background-color 0.2s;
      }

      .delete-btn:hover {
          background-color: #c82333;
      }
  - path: "js/app.js"
    language: "javascript"
    content: |
      document.addEventListener('DOMContentLoaded', () => {
          const todoInput = document.getElementById('todo-input');
          const addButton = document.getElementById('add-button');
          const todoList = document.getElementById('todo-list');

          // 할 일 추가 함수
          const addTask = () => {
              const taskText = todoInput.value.trim();

              // UC-1-01 Alternate Flow: 입력값이 비어있으면 함수 종료
              if (taskText === '') {
                  return;
              }

              // li 요소 생성
              const listItem = document.createElement('li');

              // 할 일 텍스트를 담을 span 요소 생성
              const taskSpan = document.createElement('span');
              taskSpan.textContent = taskText;
              listItem.appendChild(taskSpan);

              // 삭제 버튼 생성
              const deleteButton = document.createElement('button');
              deleteButton.textContent = '삭제';
              deleteButton.className = 'delete-btn';
              listItem.appendChild(deleteButton);

              // UC-1-01 Main Flow: 생성된 li 요소를 ul 목록에 추가
              todoList.appendChild(listItem);

              // UC-1-01 Main Flow: 입력 필드 비우기
              todoInput.value = '';
              todoInput.focus();
          };

          // '추가' 버튼 클릭 시 addTask 함수 실행
          addButton.addEventListener('click', addTask);

          // 입력 필드에서 Enter 키 입력 시 addTask 함수 실행
          todoInput.addEventListener('keypress', (e) => {
              if (e.key === 'Enter') {
                  addTask();
              }
          });

          // 이벤트 위임을 사용하여 목록의 이벤트 처리
          todoList.addEventListener('click', (e) => {
              const clickedElement = e.target;
              const listItem = clickedElement.closest('li');

              if (!listItem) return;

              // UC-1-03: '삭제' 버튼 클릭 시 항목 제거
              if (clickedElement.classList.contains('delete-btn')) {
                  todoList.removeChild(listItem);
              }
              // UC-1-02: 항목 클릭 시 완료/미완료 상태 토글
              else {
                  listItem.classList.toggle('completed');
              }
          });
      });