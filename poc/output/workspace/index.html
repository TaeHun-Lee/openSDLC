<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Lotto App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        h1 {
            color: #333;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #0056b3;
        }
        #lottoNumbers {
            margin-top: 30px;
            font-size: 24px;
            font-weight: bold;
            color: #28a745;
            min-height: 30px; /* Ensure space even when empty */
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Simple Lotto Number Generator</h1>
        <button id="generateButton">Generate Lotto Numbers</button>
        <div id="lottoNumbers"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
