name: poc-classic
description: "Original 3-node PoC pipeline (ReqAgent → ValidatorAgent → CodeAgent)"
max_iterations: 3
steps:
  - step: 1
    agent: ReqAgent
  - step: 2
    agent: ValidatorAgent
    on_fail: ReqAgent
  - step: 3
    agent: CodeAgent
    max_tokens: 16384
    min_response_chars: 2000
